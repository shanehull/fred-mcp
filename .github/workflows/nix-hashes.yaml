name: Nix Hashes

on:
  push:
    branches:
      - main
    paths:
      - 'go.sum'
      - 'nix/package.nix'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Update vendorHash
        run: |
          export HASH=$(nix build . 2>&1 | grep -oP 'got:\s*\Ksha256-[A-Za-z0-9+/=]+' | tail -n1)
          echo "Found hash: $HASH"
          jq --arg hash "$HASH" '.vendorHash = $hash' nix/hashes.json > nix/hashes.json.tmp
          mv nix/hashes.json.tmp nix/hashes.json
      - name: Commit updated hashes
        run: |-
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add nix/hashes.json
          git diff --staged --quiet || (git commit -m "chore(nix): update vendorHash" && git push)
